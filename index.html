<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语坦克大战 - English Tank Battle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="start-screen">
        <h1>英语坦克大战</h1>
        <p class="subtitle">English Tank Battle</p>
        <div class="menu">
            <button id="btn-start" onclick="startGame()">开始游戏</button>
        </div>
        <div class="controls-info">
            <h3>操作说明</h3>
            <p>W - 前进 / S - 后退</p>
            <p>A - 左转 / D - 右转</p>
            <p>鼠标左右 - 水平瞄准</p>
            <p>鼠标上下 - 垂直瞄准（打击空中目标）</p>
            <p>左键/空格 - 发射炮弹</p>
            <p>右键/R - 瞄准镜（看清远处字母）</p>
            <p>按顺序击中单词字母的敌人来拼写单词！</p>
        </div>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="hud">
            <div id="health-bar">
                <div id="health-fill"></div>
                <span id="health-text">100/100</span>
            </div>
            <div id="score-display">得分: <span id="score">0</span></div>
            <div id="kills-display">击毁: <span id="kills">0</span></div>
            <div id="ammo-display">弹药: <span id="ammo">∞</span></div>
            <div id="timer-display">时间: <span id="timer">10:00</span></div>
            <div id="crosshair">+</div>
        </div>
        <div id="hotkeys">
            <div>W 前进 / S 后退</div>
            <div>A 左转 / D 右转</div>
            <div>鼠标左右 水平瞄准</div>
            <div>鼠标上下 垂直瞄准</div>
            <div>左键/空格 射击</div>
            <div>右键/R 瞄准镜</div>
        </div>
        <div id="scope-overlay" style="display:none;">
            <div class="scope-ring"></div>
            <div class="scope-cross-h"></div>
            <div class="scope-cross-v"></div>
        </div>
    </div>

    <div id="word-popup" style="display:none;">
        <div class="word-card">
            <div class="word-en" id="popup-word"></div>
            <div class="word-cn" id="popup-meaning"></div>
        </div>
    </div>

    <div id="wrong-popup" style="display:none;">
        <div class="wrong-card">
            <div class="wrong-x">✗</div>
            <div class="wrong-text" id="wrong-text"></div>
        </div>
    </div>

    <div id="score-popup" style="display:none;">
        <div class="score-fly" id="score-fly-text"></div>
    </div>

    <div id="game-over" style="display:none;">
        <h1>游戏结束</h1>
        <div id="final-stats"></div>
        <button onclick="restartGame()">再来一局</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="js/three.min.js"></script>
    <script src="js/GLTFLoader.js"></script>
    <script src="js/RGBELoader.js"></script>
    <script src="js/Water.js"></script>
    <script src="js/modelconfig.js"></script>
    <script src="js/modelloader.js"></script>
    <script src="js/tankmodel.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/words.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/explosion.js"></script>
    <script src="js/tank.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/muzzleflash.js"></script>
    <script src="js/soldier.js?v=2"></script>
    <script src="js/animal.js"></script>
    <script src="js/aircraft.js"></script>
    <script src="js/pickup.js"></script>
    <script src="js/spell.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/input.js"></script>
    <script src="js/ui.js"></script>
    <!-- 3D 显示测试脚本 (开发环境) -->
    <script src="test/check-3d.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
